<app-navbar />

<div class="ml-[220px] min-h-screen" style="background: #1d1e22;">
  <div class="mx-auto max-w-2xl px-8 py-8">

    <div class="mb-6 flex items-center gap-3">
      <a routerLink="/clients" class="transition-colors hover:text-white" style="color: #929196;">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
      </a>
      <h1 class="text-[22px] font-bold tracking-tight text-white">{{ isEdit ? 'Edit Client' : 'New Client' }}</h1>
    </div>

    @if (loadingClient) {
      <div class="animate-pulse rounded-2xl p-8 space-y-6" style="background: #19181d; border: 1px solid rgba(255,255,255,0.06);">
        @for (f of [1,2,3,4,5]; track f) {
          <div>
            <div class="mb-2 h-3 w-24 rounded" style="background: #29282f;"></div>
            <div class="h-12 w-full rounded-xl" style="background: #29282f;"></div>
          </div>
        }
      </div>
    }

    @if (!loadingClient) {
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="rounded-2xl p-8 space-y-6" style="background: #19181d; border: 1px solid rgba(255,255,255,0.06);">

          <div>
            <label class="mb-2 block text-xs font-semibold uppercase tracking-widest" style="color: #929196;">
              Name <span class="text-red-400">*</span>
            </label>
            <input type="text" formControlName="name" placeholder="Acme Corporation"
              class="w-full rounded-xl px-4 py-3 text-sm text-white outline-none transition-all duration-200 placeholder:opacity-40
                     focus:border-indigo-500/60 focus:ring-1 focus:ring-indigo-500/20"
              [style]="(form.get('name')?.invalid && form.get('name')?.touched)
                ? 'background: #29282f; border: 1px solid rgba(239,68,68,0.4);'
                : 'background: #29282f; border: 1px solid rgba(255,255,255,0.05);'" />
            @if (form.get('name')?.invalid && form.get('name')?.touched) {
              <p class="mt-1.5 text-xs text-red-400">Name is required.</p>
            }
          </div>

          <div>
            <label class="mb-2 block text-xs font-semibold uppercase tracking-widest" style="color: #929196;">Contact Email</label>
            <input type="email" formControlName="contact_email" placeholder="contact@example.com"
              class="w-full rounded-xl px-4 py-3 text-sm text-white outline-none transition-all duration-200 placeholder:opacity-40
                     focus:border-indigo-500/60 focus:ring-1 focus:ring-indigo-500/20"
              style="background: #29282f; border: 1px solid rgba(255,255,255,0.05);" />
          </div>

          <div>
            <label class="mb-2 block text-xs font-semibold uppercase tracking-widest" style="color: #929196;">Phone</label>
            <input type="tel" formControlName="phone" placeholder="+1 (555) 000-0000"
              class="w-full rounded-xl px-4 py-3 text-sm text-white outline-none transition-all duration-200 placeholder:opacity-40
                     focus:border-indigo-500/60 focus:ring-1 focus:ring-indigo-500/20"
              style="background: #29282f; border: 1px solid rgba(255,255,255,0.05);" />
          </div>

          <div>
            <label class="mb-2 block text-xs font-semibold uppercase tracking-widest" style="color: #929196;">Billing Address</label>
            <textarea formControlName="billing_address" rows="3" placeholder="123 Main St, City, Country"
              class="w-full resize-none rounded-xl px-4 py-3 text-sm text-white outline-none transition-all duration-200 placeholder:opacity-40
                     focus:border-indigo-500/60 focus:ring-1 focus:ring-indigo-500/20"
              style="background: #29282f; border: 1px solid rgba(255,255,255,0.05);"></textarea>
          </div>

          <div>
            <label class="mb-2 block text-xs font-semibold uppercase tracking-widest" style="color: #929196;">Tax / VAT Number</label>
            <input type="text" formControlName="tax_number" placeholder="BE0123456789"
              class="w-full rounded-xl px-4 py-3 text-sm text-white outline-none transition-all duration-200 placeholder:opacity-40
                     focus:border-indigo-500/60 focus:ring-1 focus:ring-indigo-500/20"
              style="background: #29282f; border: 1px solid rgba(255,255,255,0.05);" />
          </div>

        </div>

        <div class="mt-6 flex justify-end gap-3">
          <a routerLink="/clients"
            class="rounded-xl px-5 py-2.5 text-sm font-medium text-white transition-colors hover:bg-white/5"
            style="border: 1px solid rgba(255,255,255,0.1);">Cancel</a>
          <button type="submit" [disabled]="saving"
            class="rounded-xl px-6 py-2.5 text-sm font-semibold uppercase tracking-wide text-white transition-colors hover:opacity-90 disabled:opacity-40"
            style="background: #6366f1;">
            {{ saving ? 'Saving…' : (isEdit ? 'Save Changes' : 'Create Client') }}
          </button>
        </div>
      </form>
    }

  </div>
</div>
