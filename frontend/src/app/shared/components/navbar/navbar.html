<aside class="fixed inset-y-0 left-0 z-30 flex w-[220px] flex-col"
      style="background: #19181d; border-right: 1px solid rgba(255,255,255,0.06);">

  <!-- Logo -->
  <div class="flex h-[60px] shrink-0 items-center px-5"
       style="border-bottom: 1px solid rgba(255,255,255,0.06);">
    <a routerLink="/dashboard" class="flex items-center gap-3">
      <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-xl"
           style="background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.25);">
        <!-- Receipt / invoice icon — 20×20 explicit -->
        <svg width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="#818cf8" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <span class="text-[15px] font-bold tracking-tight text-white">Bookkeeper</span>
    </a>
  </div>

  <!-- Nav links -->
  <nav class="flex-1 overflow-y-auto px-3 py-5">

    <p class="mb-1.5 px-3 text-[10px] font-semibold uppercase tracking-widest"
       style="color: #929196;">Overview</p>

    <!-- Dashboard -->
    <a routerLink="/dashboard" [routerLinkActiveOptions]="{exact:true}"
       routerLinkActive="!bg-indigo-500/10 !text-indigo-400"
       class="mb-0.5 flex items-center gap-3 rounded-xl px-3 py-2.5 text-[13px] font-medium
              transition-colors duration-150 hover:bg-white/5"
       style="color: #929196;">
      <svg width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"
           class="shrink-0">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Dashboard
    </a>

    <p class="mb-1.5 mt-5 px-3 text-[10px] font-semibold uppercase tracking-widest"
       style="color: #929196;">Billing</p>

    <!-- Clients -->
    <a routerLink="/clients" routerLinkActive="!bg-indigo-500/10 !text-indigo-400"
       class="mb-0.5 flex items-center gap-3 rounded-xl px-3 py-2.5 text-[13px] font-medium
              transition-colors duration-150 hover:bg-white/5"
       style="color: #929196;">
      <svg width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"
           class="shrink-0">
        <circle cx="9" cy="7" r="4"/>
        <path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/>
        <path d="M16 3.13a4 4 0 010 7.75"/>
        <path d="M21 21v-2a4 4 0 00-3-3.87"/>
      </svg>
      Clients
    </a>

    <!-- Invoices -->
    <a routerLink="/invoices" routerLinkActive="!bg-indigo-500/10 !text-indigo-400"
       class="mb-0.5 flex items-center gap-3 rounded-xl px-3 py-2.5 text-[13px] font-medium
              transition-colors duration-150 hover:bg-white/5"
       style="color: #929196;">
      <svg width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"
           class="shrink-0">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="9" y1="13" x2="15" y2="13"/>
        <line x1="9" y1="17" x2="15" y2="17"/>
      </svg>
      Invoices
    </a>

    <!-- Quotations -->
    <a routerLink="/quotations" routerLinkActive="!bg-indigo-500/10 !text-indigo-400"
       class="mb-0.5 flex items-center gap-3 rounded-xl px-3 py-2.5 text-[13px] font-medium
              transition-colors duration-150 hover:bg-white/5"
       style="color: #929196;">
      <svg width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"
           class="shrink-0">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <line x1="9" y1="12" x2="15" y2="12"/>
        <line x1="9" y1="16" x2="12" y2="16"/>
      </svg>
      Quotations
    </a>

  </nav>

  <!-- Footer -->
  <div class="shrink-0 px-3 py-4"
       style="background: #0f0e13; border-top: 1px solid rgba(255,255,255,0.05);">
    <button (click)="logout()"
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-[13px] font-medium
             transition-colors duration-150 hover:bg-white/5"
      style="color: #929196;">
      <svg width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"
           class="shrink-0">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign out
    </button>
  </div>

</aside>
